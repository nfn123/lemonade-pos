version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: lemonade-pos-db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - lemonade-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lemonade-pos-backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017/lemonade-pos
      JWT_SECRET: lemonade-secret-key-2026
      PORT: 5000
    depends_on:
      - mongodb
    networks:
      - lemonade-network
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lemonade-pos-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000
    depends_on:
      - backend
    networks:
      - lemonade-network
    volumes:
      - ./frontend:/app

volumes:
  mongodb_data:

networks:
  lemonade-network:
    driver: bridge
